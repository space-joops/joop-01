<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" fill="none" font-family="'Apple SD Gothic Neo','Noto Sans KR','Malgun Gothic',sans-serif">
  <!--
    OG 공유 카드 소스 (1200×630) — public/og.png 의 원본.
    재생성: 이 SVG를 크로뮴으로 열어 1200×630 스크린샷을 찍으면 된다
    (예: Playwright page.setContent 후 screenshot → public/og.png).
    스타일은 SVG 에셋 팩과 동일한 파스텔 + 외곽선 #3E4A63.
  -->
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0B1026"/>
      <stop offset="1" stop-color="#1C2A4E"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#8FC1EF" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#8FC1EF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#sky)"/>

  <!-- 별 -->
  <g fill="#CFE0FF">
    <circle cx="120" cy="90" r="3" opacity="0.8"/><circle cx="300" cy="60" r="2" opacity="0.5"/>
    <circle cx="520" cy="110" r="2.6" opacity="0.7"/><circle cx="700" cy="60" r="2" opacity="0.6"/>
    <circle cx="1120" cy="120" r="3" opacity="0.75"/><circle cx="980" cy="70" r="2" opacity="0.5"/>
    <circle cx="80" cy="300" r="2" opacity="0.5"/><circle cx="200" cy="480" r="2.4" opacity="0.6"/>
    <circle cx="640" cy="240" r="2" opacity="0.55"/><circle cx="1150" cy="330" r="2.2" opacity="0.6"/>
    <circle cx="420" cy="520" r="2" opacity="0.45"/><circle cx="880" cy="150" r="2.4" opacity="0.7"/>
    <path d="M 560 160 l 4 10 10 4 -10 4 -4 10 -4 -10 -10 -4 10 -4 Z" fill="#EAF2FF" opacity="0.9"/>
    <path d="M 1060 420 l 3 8 8 3 -8 3 -3 8 -3 -8 -8 -3 8 -3 Z" fill="#EAF2FF" opacity="0.8"/>
  </g>

  <!-- 지구 (우하단 커브) -->
  <circle cx="1080" cy="1050" r="560" fill="#5D9DE8"/>
  <circle cx="1080" cy="1050" r="560" fill="none" stroke="#BFE0FF" stroke-width="14" opacity="0.5"/>
  <ellipse cx="950" cy="590" rx="95" ry="46" fill="#8FE3B8" opacity="0.9"/>
  <ellipse cx="1130" cy="545" rx="70" ry="34" fill="#8FE3B8" opacity="0.85"/>

  <!-- 줍이 후광 -->
  <circle cx="880" cy="300" r="230" fill="url(#glow)"/>

  <!-- 줍이 (1단계 아기) — 에셋 팩 pet_stage1_baby 지오메트리 -->
  <g transform="translate(880 310) scale(1.35)">
    <g transform="scale(0.82)">
      <g transform="rotate(6.0 -69.0 16.0)">
        <rect x="-123" y="-3" width="54" height="38" rx="17.1" fill="#8FC1EF" stroke="#3E4A63" stroke-width="3.5"/>
        <rect x="-119" y="4.2" width="44" height="23.6" rx="11.4" fill="#CDE4F9"/>
      </g>
      <g transform="rotate(-6.0 69.0 16.0)">
        <rect x="69" y="-3" width="54" height="38" rx="17.1" fill="#8FC1EF" stroke="#3E4A63" stroke-width="3.5"/>
        <rect x="75" y="4.2" width="44" height="23.6" rx="11.4" fill="#CDE4F9"/>
      </g>
      <ellipse cx="0" cy="75" rx="22" ry="10" fill="#97A0B3" stroke="#3E4A63" stroke-width="3.5"/>
      <rect x="-75" y="-49" width="150" height="122" rx="34" fill="#FFF7EF" stroke="#3E4A63" stroke-width="3.5"/>
      <rect x="-37.5" y="24.2" width="75" height="41.5" rx="20.4" fill="#FFE3C9"/>
      <g transform="translate(0 -45)">
        <ellipse cx="0" cy="0" rx="9" ry="6" fill="#7C87A0" stroke="#3E4A63" stroke-width="3.5"/>
        <line x1="0" y1="0" x2="0" y2="-42" stroke="#3E4A63" stroke-width="5" stroke-linecap="round"/>
        <circle cx="0" cy="-42" r="15" fill="#FFCE59" stroke="#3E4A63" stroke-width="3.5"/>
      </g>
      <ellipse cx="-31" cy="-1.8" rx="19.3" ry="21" fill="#23D9CE" stroke="#3E4A63" stroke-width="3.5"/>
      <ellipse cx="-37.3" cy="-8.1" rx="7.1" ry="6.3" fill="#FFFFFF"/>
      <ellipse cx="-23.4" cy="4.1" rx="3.1" ry="2.7" fill="#FFFFFF"/>
      <ellipse cx="31" cy="-1.8" rx="19.3" ry="21" fill="#23D9CE" stroke="#3E4A63" stroke-width="3.5"/>
      <ellipse cx="24.7" cy="-8.1" rx="7.1" ry="6.3" fill="#FFFFFF"/>
      <ellipse cx="38.6" cy="4.1" rx="3.1" ry="2.7" fill="#FFFFFF"/>
      <ellipse cx="0" cy="32.2" rx="5.5" ry="4" fill="#46536B" stroke="#3E4A63" stroke-width="2.45"/>
      <ellipse cx="-66" cy="9.8" rx="10.5" ry="7.6" fill="#FFB1C1"/>
      <ellipse cx="66" cy="9.8" rx="10.5" ry="7.6" fill="#FFB1C1"/>
    </g>
  </g>

  <!-- 떠다니는 파편 (볼트·기어 느낌) -->
  <g transform="translate(740 205) rotate(-18)">
    <circle r="15" fill="#C7CEDB" stroke="#3E4A63" stroke-width="3"/>
    <rect x="-6" y="12" width="12" height="28" rx="5" fill="#7C87A0" stroke="#3E4A63" stroke-width="3"/>
  </g>
  <g transform="translate(1080 250) rotate(24)">
    <circle r="20" fill="#97A0B3" stroke="#3E4A63" stroke-width="3"/>
    <circle r="8" fill="#46536B"/>
    <rect x="-4" y="-30" width="8" height="12" rx="2" fill="#97A0B3" stroke="#3E4A63" stroke-width="2.4"/>
    <rect x="-4" y="18" width="8" height="12" rx="2" fill="#97A0B3" stroke="#3E4A63" stroke-width="2.4"/>
    <rect x="-30" y="-4" width="12" height="8" rx="2" fill="#97A0B3" stroke="#3E4A63" stroke-width="2.4"/>
    <rect x="18" y="-4" width="12" height="8" rx="2" fill="#97A0B3" stroke="#3E4A63" stroke-width="2.4"/>
  </g>

  <!-- 타이틀 -->
  <text x="90" y="150" font-size="34" font-weight="600" letter-spacing="14" fill="#8FC1EF">CLEAR SKY ‧ 관제 콘솔</text>
  <text x="84" y="310" font-size="150" font-weight="800" fill="#FFFFFF">줍스</text>
  <text x="400" y="310" font-size="72" font-weight="700" letter-spacing="10" fill="#8FC1EF">JOOPS</text>
  <text x="90" y="400" font-size="44" font-weight="700" fill="#E8EAF6">우주 쓰레기 청소 위성 펫</text>
  <text x="90" y="470" font-size="30" fill="#AAB3D6">인공위성 펫 줍이와 함께 밤하늘의 별빛을 되찾으세요</text>

  <!-- 하단 게이지 장식 (3대 지표 색) -->
  <g transform="translate(90 530)">
    <rect width="180" height="10" rx="5" fill="#23264A"/><rect width="140" height="10" rx="5" fill="#FBBF24"/>
    <rect x="210" width="180" height="10" rx="5" fill="#23264A"/><rect x="210" width="120" height="10" rx="5" fill="#34D399"/>
    <rect x="420" width="180" height="10" rx="5" fill="#23264A"/><rect x="420" width="80" height="10" rx="5" fill="#818CF8"/>
  </g>
</svg>
