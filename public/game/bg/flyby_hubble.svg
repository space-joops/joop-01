<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 96" width="256" height="96" fill="none">
  <!-- 플라이바이: 허블 우주망원경 — 은박 경통 + 열린 조리개 도어 + 태양전지 패널 -->
  <defs>
    <linearGradient id="hub-tube" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F0F2F6"/>
      <stop offset="0.45" stop-color="#C9CFD9"/>
      <stop offset="1" stop-color="#8B93A1"/>
    </linearGradient>
    <linearGradient id="hub-aft" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#B9C0CC"/>
      <stop offset="1" stop-color="#6E7684"/>
    </linearGradient>
    <linearGradient id="hub-cell" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3566B8"/>
      <stop offset="1" stop-color="#17325E"/>
    </linearGradient>
  </defs>

  <!-- 열린 조리개 도어 (앞단 위로 젖혀짐) -->
  <g transform="rotate(-38 62 30)">
    <rect x="34" y="24" width="30" height="12" rx="3" fill="#AEB6C2"/>
    <rect x="36" y="26" width="26" height="8" rx="2" fill="#7A828F"/>
  </g>

  <!-- 메인 경통 -->
  <rect x="58" y="26" width="140" height="44" rx="6" fill="url(#hub-tube)"/>
  <!-- 앞단 개구부(어둠) -->
  <rect x="58" y="29" width="10" height="38" rx="4" fill="#1A2030"/>
  <!-- 경통 링 디테일 -->
  <g stroke="#9AA2B0" stroke-width="1.2">
    <path d="M80 26v44M118 26v44M150 26v44"/>
  </g>
  <path d="M58 32h140" stroke="#FAFBFD" stroke-width="1.4" opacity="0.8"/>
  <path d="M58 64h140" stroke="#5F6774" stroke-width="1.2" opacity="0.6"/>
  <!-- 은박 질감 포인트 -->
  <path d="M86 34l8 5M126 52l8 5M158 36l7 4" stroke="#FFFFFF" stroke-width="1" opacity="0.55"/>

  <!-- 후미부 (장비 구역) -->
  <rect x="196" y="30" width="26" height="36" rx="8" fill="url(#hub-aft)"/>
  <circle cx="209" cy="48" r="6" fill="#3C4451"/>
  <circle cx="209" cy="48" r="2.5" fill="#66FCF1" opacity="0.8"/>

  <!-- 태양전지 패널 (위·아래) -->
  <g>
    <rect x="122" y="21" width="4" height="7" fill="#6E7684"/>
    <rect x="96" y="4" width="56" height="17" rx="1.5" fill="#3C4451"/>
    <rect x="98" y="6" width="52" height="13" fill="url(#hub-cell)"/>
    <path d="M111 6v13M124 6v13M137 6v13" stroke="#0D1F3C" stroke-width="1.2"/>
    <path d="M98 12.5h52" stroke="#2E5AA8" stroke-width="0.7" opacity="0.8"/>
    <rect x="122" y="68" width="4" height="7" fill="#6E7684"/>
    <rect x="96" y="75" width="56" height="17" rx="1.5" fill="#3C4451"/>
    <rect x="98" y="77" width="52" height="13" fill="url(#hub-cell)"/>
    <path d="M111 77v13M124 77v13M137 77v13" stroke="#0D1F3C" stroke-width="1.2"/>
    <path d="M98 83.5h52" stroke="#2E5AA8" stroke-width="0.7" opacity="0.8"/>
  </g>

  <!-- 고이득 안테나 -->
  <line x1="176" y1="26" x2="186" y2="12" stroke="#8892A0" stroke-width="1.4"/>
  <ellipse cx="187.5" cy="10.5" rx="5" ry="3.2" fill="#D9DEE6"/>
</svg>
