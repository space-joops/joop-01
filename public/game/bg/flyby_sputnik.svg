<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128" fill="none">
  <!-- 플라이바이: 스푸트니크 1호 — 광택 금속 구체 + 뒤로 뻗은 안테나 4개 -->
  <defs>
    <radialGradient id="spk-ball" cx="0.35" cy="0.3" r="0.9">
      <stop offset="0" stop-color="#FDFEFF"/>
      <stop offset="0.35" stop-color="#D7DCE4"/>
      <stop offset="0.75" stop-color="#98A2B0"/>
      <stop offset="1" stop-color="#5F6876"/>
    </radialGradient>
  </defs>

  <!-- 안테나 4개 — 진행 반대 방향으로 길게 쓸린다 -->
  <g stroke="#C7CEDB" stroke-width="1.6" stroke-linecap="round">
    <line x1="72" y1="36" x2="14" y2="78"/>
    <line x1="68" y1="44" x2="6" y2="98"/>
    <line x1="68" y1="56" x2="10" y2="114"/>
    <line x1="74" y1="62" x2="26" y2="120"/>
  </g>
  <g stroke="#6E7684" stroke-width="0.7" opacity="0.8">
    <line x1="72" y1="36" x2="14" y2="78"/>
    <line x1="68" y1="56" x2="10" y2="114"/>
  </g>

  <!-- 본체 구체 -->
  <circle cx="82" cy="48" r="27" fill="url(#spk-ball)"/>
  <!-- 적도 접합 링 -->
  <path d="M55.5 51 A27 9 0 0 0 108.5 45" stroke="#7A828F" stroke-width="1.3" fill="none" opacity="0.85"/>
  <!-- 리벳 포인트 -->
  <g fill="#8E98A8">
    <circle cx="66" cy="41" r="1.1"/><circle cx="76" cy="35" r="1.1"/><circle cx="90" cy="33" r="1.1"/>
    <circle cx="101" cy="40" r="1.1"/><circle cx="104" cy="52" r="1.1"/><circle cx="97" cy="64" r="1.1"/>
  </g>
  <!-- 하이라이트 -->
  <ellipse cx="72" cy="37" rx="8" ry="5.5" fill="#FFFFFF" opacity="0.85"/>
</svg>
